<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css 1/style.css">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand" href="index.html">Noisery</a>
</div>
</nav>
<!-- HERO -->
<section class="gallery-hero text-center text-white d-flex align-items-center">
  <div class="container">
    <h1 data-aos="fade-up">Campus Gallery</h1>
    <p data-aos="fade-up" data-aos-delay="200">
      Explore life at Noisery University
    </p>
  </div>
</section>

<!-- FILTER BUTTONS -->
<section class="container text-center py-4">
  <button class="btn btn-info m-2 filter-btn" data-filter="all">All</button>
  <button class="btn btn-info m-2 filter-btn" data-filter="campus">Campus</button>
  <button class="btn btn-info m-2 filter-btn" data-filter="students">Students</button>
  <button class="btn btn-info m-2 filter-btn" data-filter="events">Events</button>
</section>

<!-- GALLERY GRID -->
<section class="container pb-5">
  <div class="row g-3" id="gallery">

    <div class="col-md-4 gallery-item campus" data-aos="zoom-in">
      <img src="img1/img 6.avif">
    </div>

    <div class="col-md-4 gallery-item students" data-aos="zoom-in">
      <img src="img1/img7.jpg">
    </div>

    <div class="col-md-4 gallery-item events" data-aos="zoom-in">
      <img src="img1/img7.jpeg">
    </div>

    <div class="col-md-4 gallery-item campus" data-aos="zoom-in">
      <img src="img1/img8.jpeg">
    </div>

    <div class="col-md-4 gallery-item students" data-aos="zoom-in">
      <img src="img1/img9.jpeg">
    </div>

    <div class="col-md-4 gallery-item events" data-aos="zoom-in">
      <img src="img1/img10.jpeg">
    </div>

  </div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span onclick="closeLightbox()">×</span>
  <img id="lightbox-img">
</div>

<div class="container mt-5">
<div class="row g-3">

<div class="col-md-4" data-aos="zoom-in">
<img src="img1/img11.jpg">
</div>

<div class="col-md-4" data-aos="zoom-in" data-aos-delay="200">
<img src="img1/img13.avif">
</div>

<div class="col-md-4" data-aos="zoom-in" data-aos-delay="400">
<img src="img1/img14.png">
</div>

</div>
</div>

<script src="js 1/script.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>
<script src="js 1/gallery.js"></script>
</body>
</html>
