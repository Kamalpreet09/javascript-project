<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css 1/style.css">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand" href="index.html">Noisery</a>
</div>
</nav>

<!-- HERO -->
<section class="contact-hero text-center text-white d-flex align-items-center">
  <div class="container">
    <h1 data-aos="fade-up">Contact Us</h1>
    <p data-aos="fade-up" data-aos-delay="200">
      We’d love to hear from you
    </p>
  </div>
</section>

<!-- CONTACT INFO -->
<section class="container py-5">
  <div class="row text-center">

    <div class="col-md-4" data-aos="zoom-in">
      <div class="card-custom p-4">
        <h4>📍 Address</h4>
        <p>Noisery University, India</p>
      </div>
    </div>

    <div class="col-md-4" data-aos="zoom-in" data-aos-delay="200">
      <div class="card-custom p-4">
        <h4>📞 Phone</h4>
        <p>+91 9876543210</p>
      </div>
    </div>

    <div class="col-md-4" data-aos="zoom-in" data-aos-delay="400">
      <div class="card-custom p-4">
        <h4>📧 Email</h4>
        <p>info@noisery.edu</p>
      </div>
    </div>

  </div>
</section>

<!-- CONTACT FORM -->
<section class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <form id="contactForm" class="form-box glass p-4">

        <h3 class="text-center mb-4">Send Message</h3>

        <input type="text" id="cname" class="form-control my-2" placeholder="Your Name">
        <input type="email" id="cemail" class="form-control my-2" placeholder="Your Email">
        <textarea id="message" class="form-control my-2" placeholder="Your Message"></textarea>

        <button class="btn btn-light w-100 mt-2">Send Message</button>

      </form>

    </div>
  </div>
</section>

<!-- MAP -->
<section class="container pb-5">
  <iframe 
    src="https://maps.google.com/maps?q=university&t=&z=13&ie=UTF8&iwloc=&output=embed"
    width="100%" height="300" style="border-radius:10px;">
  </iframe>
</section>

<!-- SUCCESS POPUP -->
<div id="contactPopup" class="popup">
  <div class="popup-content">
    <h2>✅ Message Sent!</h2>
    <p>We will contact you soon.</p>
    <button onclick="closeContactPopup()" class="btn btn-info">OK</button>
  </div>
</div>

<script src="js 1/script.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();
</script>
<script src="js 1/contact.js"></script>
</body>
</html>
